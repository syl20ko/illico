<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Illico Rachat Auto — Stratégie de croissance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1A1A2E;--dark-light:#16213E;--dark-mid:#0F3460;
  --orange:#E87524;--orange-light:#F49D4C;--orange-dark:#C45E18;--orange-pale:#FFF5EC;
  --teal:#00B4D8;--teal-light:#48CAE4;--teal-dark:#0096C7;
  --bg:#F8F9FA;--bg-warm:#FFF9F5;--white:#FFFFFF;--text:#2D3436;
  --slate:#636E72;--slate-light:#B2BEC3;
  --serif:'Sora',system-ui,sans-serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--text);background:var(--bg);line-height:1.6;font-size:16px;overflow-x:hidden}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark) 0%,var(--dark-light) 50%,var(--dark-mid) 100%);transition:opacity .6s var(--ease),visibility .6s}
.login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
.login-logo{font-family:var(--serif);font-size:26px;color:var(--dark);margin-bottom:4px;font-weight:700}
.login-logo .accent{color:var(--orange)}
.login-sub{color:var(--slate);font-size:14px;margin-bottom:32px}
.login-field{position:relative;margin-bottom:16px}
.login-field input{width:100%;padding:14px 18px;border:2px solid #E2E8F0;border-radius:10px;font-family:var(--sans);font-size:16px;transition:border-color .2s;outline:none;-webkit-appearance:none}
.login-field input:focus{border-color:var(--orange)}
.login-field input.error{border-color:#EF4444;animation:shake .4s}
.login-btn{width:100%;padding:14px;background:var(--orange);color:var(--white);border:none;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.login-btn:hover{background:var(--orange-dark)}
.login-btn:active{transform:scale(.98)}
.login-error{color:#EF4444;font-size:13px;margin-top:8px;min-height:20px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* CONTENT */
.proposal{display:none;opacity:0;transition:opacity .8s var(--ease)}
.proposal.visible{display:block;opacity:1}
.container{max-width:960px;margin:0 auto;padding:0 24px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark-light) 60%,var(--dark-mid) 100%);color:var(--white);padding:80px 0 64px;text-align:center}
.hero-badge{display:inline-block;background:rgba(232,117,36,.2);color:var(--orange-light);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:clamp(28px,4.5vw,46px);line-height:1.2;font-weight:700;margin-bottom:20px;letter-spacing:-.02em}
.hero h1 .accent{color:var(--orange-light)}
.hero-subtitle{max-width:640px;margin:0 auto 28px;color:var(--slate-light);font-size:17px;line-height:1.65}
.hero-meta{color:var(--slate-light);font-size:14px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.hero-meta .separator{color:var(--slate)}

/* SECTIONS */
section{padding:72px 0}
section:nth-child(even){background:var(--white)}
h2{font-family:var(--serif);font-size:clamp(24px,3.5vw,34px);font-weight:700;margin-bottom:12px;letter-spacing:-.015em;color:var(--dark)}
h3{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--dark);margin-bottom:12px}
.section-intro{color:var(--slate);font-size:16px;margin-bottom:36px;max-width:700px;line-height:1.7}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{background:var(--white);border:1px solid #E2E8F0;border-radius:14px;padding:24px;text-align:center}
.stat-value{font-size:36px;font-weight:800;color:var(--dark);line-height:1}
.stat-value .accent{color:var(--orange)}
.stat-label{font-size:13px;color:var(--slate);margin-top:8px;line-height:1.4}

/* MARKET TABLE */
.market-table{width:100%;border-collapse:collapse;margin-bottom:32px;font-size:14px}
.market-table th{background:var(--dark);color:var(--white);padding:12px 16px;text-align:left;font-weight:600;font-size:13px}
.market-table th:first-child{border-radius:8px 0 0 0}
.market-table th:last-child{border-radius:0 8px 0 0}
.market-table td{padding:12px 16px;border-bottom:1px solid #E2E8F0}
.market-table tr:hover td{background:var(--orange-pale)}
.market-table .highlight{font-weight:600;color:var(--orange-dark)}

/* COMPETITOR LIST */
.competitor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.competitor-card{background:var(--white);border:1px solid #E2E8F0;border-radius:12px;padding:20px;transition:transform .2s}
.competitor-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.competitor-name{font-weight:700;color:var(--dark);margin-bottom:4px}
.competitor-detail{font-size:13px;color:var(--slate);line-height:1.5}
.competitor-stat{display:inline-block;background:var(--orange-pale);color:var(--orange-dark);font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:8px}

/* ACTION CARDS */
.action-list{display:flex;flex-direction:column;gap:16px;margin-bottom:32px}
.action-card{background:var(--white);border:1px solid #E2E8F0;border-radius:12px;padding:20px 24px;display:flex;gap:16px;align-items:flex-start}
.action-card:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(232,117,36,.1)}
.action-num{flex-shrink:0;width:36px;height:36px;background:var(--orange);color:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.action-body h4{font-weight:600;color:var(--dark);margin-bottom:4px;font-size:15px}
.action-body p{font-size:14px;color:var(--slate);line-height:1.6}
.action-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:6px}
.tag-quick{background:#DCFCE7;color:#166534}
.tag-struct{background:#DBEAFE;color:#1E40AF}
.tag-strat{background:#F3E8FF;color:#6B21A8}

/* PERSONA CARDS */
.persona-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.persona-card{background:var(--white);border:1px solid #E2E8F0;border-radius:12px;padding:20px;border-top:4px solid var(--orange)}
.persona-name{font-weight:700;color:var(--dark);font-size:16px}
.persona-pct{font-size:28px;font-weight:800;color:var(--orange);margin:8px 0}
.persona-desc{font-size:13px;color:var(--slate);line-height:1.5}
.persona-vehicle{font-size:12px;color:var(--slate-light);margin-top:8px;font-style:italic}

/* SEO PLAN */
.seo-phases{display:flex;flex-direction:column;gap:20px;margin-bottom:32px}
.phase-card{background:var(--white);border:1px solid #E2E8F0;border-radius:12px;padding:24px;position:relative;overflow:hidden}
.phase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--orange)}
.phase-num{font-size:12px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.phase-title{font-weight:700;color:var(--dark);font-size:17px;margin-bottom:8px}
.phase-detail{font-size:14px;color:var(--slate);line-height:1.6}
.phase-result{display:inline-block;background:var(--orange-pale);color:var(--orange-dark);font-size:13px;font-weight:600;padding:4px 12px;border-radius:6px;margin-top:12px}

/* PRICING */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;align-items:start}
.pricing-card{background:var(--white);border:2px solid #E2E8F0;border-radius:16px;padding:32px 24px;position:relative;transition:transform .2s,box-shadow .2s}
.pricing-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px -8px rgba(0,0,0,.08)}
.pricing-card.recommended{border-color:var(--orange);box-shadow:0 8px 32px -8px rgba(232,117,36,.2)}
.pricing-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--orange);color:var(--white);font-size:12px;font-weight:700;padding:4px 16px;border-radius:100px;letter-spacing:.04em;text-transform:uppercase}
.pricing-name{font-family:var(--serif);font-size:22px;color:var(--dark);margin-bottom:8px;font-weight:700}
.pricing-price{font-size:42px;font-weight:800;color:var(--dark);line-height:1;margin-bottom:4px}
.pricing-currency{font-size:16px;font-weight:500;color:var(--slate)}
.pricing-period{font-size:14px;color:var(--slate);margin-bottom:20px}
.pricing-features{list-style:none;margin-bottom:24px}
.pricing-features li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:14px;line-height:1.5;color:var(--slate)}
.pricing-features .check{flex-shrink:0;color:var(--orange);margin-top:2px}

/* INSIGHT BOX */
.insight-box{display:flex;gap:20px;background:var(--bg-warm);border-left:4px solid var(--orange);border-radius:0 12px 12px 0;padding:24px;margin:32px 0}
.insight-box p{font-size:15px;color:var(--text);line-height:1.7}
.insight-box strong{color:var(--dark)}

/* CTA */
.cta-section{padding:72px 0;text-align:center;background:linear-gradient(135deg,var(--dark) 0%,var(--dark-mid) 100%);color:var(--white)}
.cta-section h2{color:var(--white);margin-bottom:12px}
.cta-section p{color:var(--slate-light);font-size:17px;margin-bottom:28px}
.cta-button{display:inline-block;padding:16px 40px;background:var(--orange);color:var(--white);text-decoration:none;font-family:var(--sans);font-size:17px;font-weight:600;border-radius:10px;transition:background .2s,transform .1s}
.cta-button:hover{background:var(--orange-dark)}
.cta-button:active{transform:scale(.98)}
.cta-sub{font-size:13px;color:var(--slate-light);margin-top:12px}

/* FOOTER */
footer{padding:40px 0;text-align:center;border-top:1px solid #E2E8F0;color:var(--slate-light);font-size:13px}
footer p{margin-bottom:4px}

/* RESPONSIVE */
@media(max-width:768px){
  .pricing-grid{grid-template-columns:1fr;max-width:380px;margin:0 auto}
  .pricing-card.recommended{order:-1}
  .hero{padding:56px 0 48px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .action-card{flex-direction:column;gap:12px}
  .login-card{padding:36px 24px}
  .competitor-grid{grid-template-columns:1fr}
  .persona-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .hero-meta{flex-direction:column;gap:4px}
  .hero-meta .separator{display:none}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
  html{scroll-behavior:auto}
}
</style>
</head>

<script>
(function(){
  const form = document.getElementById('loginForm');
  const input = document.getElementById('passwordInput');
  const error = document.getElementById('loginError');
  const screen = document.getElementById('loginScreen');
  const proposal = document.getElementById('proposal');
  const payloadEl = document.getElementById('encryptedPayload');

  function b64ToArr(b64){
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return arr;
  }

  async function decrypt(password){
    const payload = JSON.parse(payloadEl.textContent);
    const salt = b64ToArr(payload.salt);
    const iv = b64ToArr(payload.iv);
    const tag = b64ToArr(payload.tag);
    const data = b64ToArr(payload.data);
    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
      keyMaterial,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, combined);
    return new TextDecoder().decode(decrypted);
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const pwd = input.value.trim();
    if(!pwd){input.focus();return;}
    try{
      const html = await decrypt(pwd);
      proposal.innerHTML = html;
      proposal.classList.add('visible');
      screen.classList.add('hidden');
    } catch(err){
      error.textContent = 'Mot de passe incorrect';
      input.classList.add('error');
      input.value = '';
      input.focus();
      setTimeout(()=>{input.classList.remove('error');error.textContent='';},2000);
    }
  });
})();
</script>
